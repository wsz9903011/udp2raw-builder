name: Build OpenWrt Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          gettext \
          git \
          libncurses-dev \
          libssl-dev \
          python3 \
          rsync \
          unzip \
          wget \
          zlib1g-dev \
          file

    - name: Download SDK
      run: |
        wget https://downloads.openwrt.org/releases/25.12.4/targets/rockchip/armv8/openwrt-sdk-25.12.4-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    - name: Extract SDK
      run: |
        tar --zstd -xf openwrt-sdk-*.tar.zst

    - name: Find SDK
      id: sdk
      run: |
        echo "SDK=$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*')" >> $GITHUB_ENV

    - name: Update feeds
      run: |
        cd $SDK
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy package
      run: |
        cp -r package/* $SDK/package/

    - name: Defconfig
      run: |
        cd $SDK
        make defconfig

    - name: Build openwrt-udp2raw
      run: |
        cd $SDK
        make package/openwrt-udp2raw/compile -j$(nproc) V=s

    - name: Build luci-app-udp2raw
      run: |
        cd $SDK
        make package/luci-app-udp2raw/compile -j$(nproc) V=s

    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-Packages
        path: |
          ${{ env.SDK }}/bin/packages/
